<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixora | Preparing...</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #fdfcff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: 'Outfit', sans-serif;
        }
        .brand-logo { font-size: 2.5rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 1rem; color: #1f2937; }
        .gradient-text {
            background: linear-gradient(135deg, #9333ea, #db2777);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
        }
        .loader { 
            border: 4px solid #f1ecf6; 
            border-top: 4px solid #db2777; 
            border-right: 4px solid #9333ea; 
            border-radius: 50%; width: 50px; height: 50px; 
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite; 
        }
        .text-muted { color: #6b7280; font-weight: 500; margin-top: 20px; font-size: 0.9rem; letter-spacing: 1px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <script>
        setTimeout(() => {
            const storedUser = localStorage.getItem('hotelUser');
            if (storedUser) {
                const user = JSON.parse(storedUser);
                window.location.href = user.role === 'admin' ? 'admin.html' : 'customer.html';
            } else {
                window.location.href = 'login.html';
            }
        }, 1200); // 1.2 saat untuk tayang logo
    </script>
</head>
<body>
    <div class="brand-logo">PIX<span class="gradient-text">ORA.</span></div>
    <div class="loader"></div>
    <p class="text-muted">LOADING EXPERIENCE...</p>
</body>
</html>
