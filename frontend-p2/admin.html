<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixora | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style>
        :root { --bg-light: #fdfcff; --border-color: #f1ecf6; --pixora-purple: #9333ea; --pixora-pink: #db2777; --accent-gradient: linear-gradient(135deg, var(--pixora-purple), var(--pixora-pink)); --text-main: #1f2937; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-light); color: var(--text-main); padding-bottom: 50px;}
        .gradient-text { background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
        .navbar-island { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(147, 51, 234, 0.1); border-radius: 50px; margin: 20px auto 40px; max-width: 1200px; padding: 12px 25px; box-shadow: 0 10px 40px rgba(147, 51, 234, 0.06); display: flex; justify-content: space-between; align-items: center; }
        .pix-card { background: #fff; border-radius: 24px; padding: 24px; border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.02); height: 100%; transition: 0.3s; }
        .pix-card:hover { box-shadow: 0 15px 35px rgba(147, 51, 234, 0.06); transform: translateY(-3px); }
        .stat-value { font-size: 2.5rem; font-weight: 800; line-height: 1.2; }
        .table th { border: none; font-size: 0.75rem; text-transform: uppercase; color: #6b7280; padding-bottom: 15px; }
        .table td { border-bottom: 1px solid var(--border-color); vertical-align: middle; font-weight: 500; }
        .btn-pixora { background: var(--accent-gradient); color: #fff; font-weight: 600; border: none; border-radius: 12px; padding: 12px 20px; }
    </style>
</head>
<body>

<div class="px-3"><nav class="navbar-island"><h1 class="m-0 fs-4 fw-bold">PIX<span class="gradient-text">ORA.</span> <span class="text-muted fw-medium ms-2 border-start ps-3 fs-6">Admin</span></h1><button class="btn btn-light rounded-pill px-4 fw-bold border shadow-sm" onclick="logout()">Log Out</button></nav></div>

<div class="container mb-5">
    <div class="row g-4 mb-4" id="analytics-overview"></div>

    <div class="row g-4 mb-4">
        <div class="col-lg-8"><div class="pix-card"><h5 class="fw-bold mb-4">Revenue Trend (Top Hotels)</h5><canvas id="revenueChart" height="100"></canvas></div></div>
        <div class="col-lg-4"><div class="pix-card"><h5 class="fw-bold mb-4">Booking Status</h5><canvas id="statusChart" height="200"></canvas></div></div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8"><div class="pix-card"><h5 class="fw-bold mb-4">Global Ledger</h5><table class="table"><thead><tr><th>Guest</th><th>Property</th><th>Dates</th><th>Status</th><th>Act</th></tr></thead><tbody id="all-reservations"></tbody></table></div></div>
        <div class="col-lg-4 d-flex flex-column gap-4"><div class="pix-card"><h5 class="fw-bold mb-4">Properties</h5><div id="admin-hotel-list" class="d-flex flex-column gap-3"></div></div></div>
    </div>
</div>

<script>
    const API_BASE = '/hotel-api/api'; const API_KEY = 'hotel-secret-key-2026'; const CURRENCY = 'RM';
    let statusChartInst = null; let revChartInst = null;

    const user = JSON.parse(localStorage.getItem('hotelUser'));
    if (!user || user.role !== 'admin') window.location.href = 'login.html';
    function logout() { localStorage.removeItem('hotelUser'); window.location.href = 'login.html'; }

    async function apiCall(endpoint, method = 'GET', body = null) {
        const options = { method, headers: { 'X-API-KEY': API_KEY, 'Content-Type': 'application/json' } };
        if (body) options.body = JSON.stringify(body);
        const res = await fetch(`${API_BASE}${endpoint}`, options); return await res.json();
    }

    async function loadAdminData() {
        const [stats, bookings, hotels] = await Promise.all([ apiCall('/analytics/overview'), apiCall('/bookings'), apiCall('/hotels') ]);

        if (stats.success) {
            document.getElementById('analytics-overview').innerHTML = `<div class="col-md-3"><div class="pix-card text-center"><div class="stat-value gradient-text">${stats.data.total_bookings}</div><div class="mt-2 text-muted fw-bold">TOTAL BOOKINGS</div></div></div><div class="col-md-3"><div class="pix-card text-center"><div class="stat-value gradient-text">${CURRENCY}${stats.data.total_revenue}</div><div class="mt-2 text-muted fw-bold">REVENUE</div></div></div><div class="col-md-3"><div class="pix-card text-center"><div class="stat-value gradient-text">${hotels.data.length}</div><div class="mt-2 text-muted fw-bold">TOTAL PROPERTIES</div></div></div><div class="col-md-3"><div class="pix-card text-center"><div class="stat-value gradient-text">${stats.data.total_users}</div><div class="mt-2 text-muted fw-bold">ACTIVE MEMBERS</div></div></div>`;

            document.getElementById('all-reservations').innerHTML = bookings.data.map(b => `<tr><td><div class="fw-bold">${b.user_name}</div></td><td>${b.hotel_name}</td><td class="text-muted small">${new Date(b.check_in).toLocaleDateString('en-GB')} <i class="fas fa-arrow-right mx-1 opacity-50"></i> ${new Date(b.check_out).toLocaleDateString('en-GB')}</td><td><select class="form-select rounded-pill text-uppercase fw-bold" style="font-size:0.75rem" onchange="updateStatus(${b.id}, this.value)"><option value="pending" ${b.status==='pending'?'selected':''}>Pending</option><option value="confirmed" ${b.status==='confirmed'?'selected':''}>Confirmed</option><option value="cancelled" ${b.status==='cancelled'?'selected':''}>Cancelled</option></select></td><td class="text-end"><button class="btn btn-light rounded-circle text-danger border" onclick="deleteBooking(${b.id})"><i class="fas fa-trash-alt"></i></button></td></tr>`).join('');

            document.getElementById('admin-hotel-list').innerHTML = hotels.data.map(h => `<div class="d-flex align-items-center"><img src="${h.image_url}" class="rounded-3 me-3" style="width: 50px; height: 50px; object-fit: cover;"><div class="flex-grow-1"><div class="fw-bold small">${h.name}</div><div class="text-muted fw-medium" style="font-size:0.75rem">${CURRENCY}${h.price_per_night} /nt</div></div></div>`).join('');

            // JANA GRAF DARI DATA BOOKING
            const counts = { pending: 0, confirmed: 0, cancelled: 0 };
            const revPerHotel = {};
            bookings.data.forEach(b => { 
                counts[b.status]++; 
                if(b.status === 'confirmed') { revPerHotel[b.hotel_name] = (revPerHotel[b.hotel_name] || 0) + parseFloat(b.price_per_night); }
            });

            if(statusChartInst) statusChartInst.destroy();
            statusChartInst = new Chart(document.getElementById('statusChart'), { type: 'doughnut', data: { labels: ['Pending', 'Confirmed', 'Cancelled'], datasets: [{ data: [counts.pending, counts.confirmed, counts.cancelled], backgroundColor: ['#f59e0b', '#10b981', '#ef4444'], borderWidth: 0 }] }, options: { cutout: '75%', plugins: { legend: { position: 'bottom' } } } });

            if(revChartInst) revChartInst.destroy();
            revChartInst = new Chart(document.getElementById('revenueChart'), { type: 'bar', data: { labels: Object.keys(revPerHotel).slice(0,5), datasets: [{ label: 'Revenue (RM)', data: Object.values(revPerHotel).slice(0,5), backgroundColor: '#9333ea', borderRadius: 6 }] }, options: { scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } } } });
        }
    }
    async function updateStatus(id, status) { await apiCall(`/bookings/${id}`, 'PUT', { status }); loadAdminData(); }
    async function deleteBooking(id) { if(confirm('Delete?')) { await apiCall(`/bookings/${id}`, 'DELETE'); loadAdminData(); } }
    loadAdminData();
</script>
</body>
</html>
